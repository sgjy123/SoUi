<svg width="200" height="240" viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 图形部分 -->
  <g transform="translate(0, 20)">
    <!-- 左括号 -->
    <path
      d="M60 40C50 40 40 60 40 100C40 140 50 160 60 160"
      stroke="#1677ff"
      stroke-width="12"
      stroke-linecap="round"
    />
    
    <!-- 右括号 -->
    <path
      d="M140 40C150 40 160 60 160 100C160 140 150 160 140 160"
      stroke="#1677ff"
      stroke-width="12"
      stroke-linecap="round"
    />
    
    <!-- 双斜线 - 渐变效果 -->
    <rect
      x="85"
      y="50"
      width="12"
      height="100"
      rx="6"
      fill="url(#gradient1)"
      transform="rotate(15 91 100)"
    />
    
    <rect
      x="105"
      y="50"
      width="12"
      height="100"
      rx="6"
      fill="url(#gradient2)"
      transform="rotate(15 111 100)"
    />
    
    <!-- 渐变定义 -->
    <defs>
      <linearGradient id="gradient1" x1="85" y1="50" x2="97" y2="150" gradientUnits="userSpaceOnUse">
        <stop stop-color="#1677ff" />
        <stop offset="1" stop-color="#4096ff" />
      </linearGradient>
      
      <linearGradient id="gradient2" x1="105" y1="50" x2="117" y2="150" gradientUnits="userSpaceOnUse">
        <stop stop-color="#4096ff" />
        <stop offset="1" stop-color="#1677ff" />
      </linearGradient>
    </defs>
  </g>
  
  <!-- SoUi 文字 -->
  <!-- <text
    x="100"
    y="215"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="bold"
    fill="#222"
    letter-spacing="1px"
  >
    SoUi
  </text> -->
</svg>
